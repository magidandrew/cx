name: Test patches against claude-code

# Runs every morning (and on-demand) against the latest
# @anthropic-ai/claude-code. Tries each cx patch in isolation so one
# broken patch never hides another. On failure, opens or updates a
# single tracking issue; on recovery, closes it.

on:
  schedule:
    # 08:00 UTC daily. Anthropic typically publishes CC earlier in the
    # day, so by this time the newest release has been up long enough
    # for a test to be useful.
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'claude-code version to test (e.g. 2.1.101, or "latest")'
        default: 'latest'
        required: false

permissions:
  contents: read
  issues: write

# Opt every javascript action (e.g. actions/upload-artifact@v4) into
# Node 24. Without this the runner emits a deprecation warning about
# Node 20 until GitHub forces the switch on 2026-06-02.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: npm ci

      # The script exits 1 if any patch failed. We deliberately let the
      # job continue so downstream steps can build a report and manage
      # the tracking issue — the final "Set job status" step fails the
      # workflow at the end if anything broke.
      - name: Run per-patch tester
        id: test
        continue-on-error: true
        run: bun scripts/test-patches.ts "${{ github.event.inputs.version || 'latest' }}"

      - name: Guard against missing report
        run: |
          if [ ! -f .test-cache/report.json ]; then
            echo "::error::test-patches.ts did not produce a report — it crashed before the loop ran."
            exit 1
          fi

      - name: Build issue body
        run: |
          VERSION=$(jq -r '.version'  .test-cache/report.json)
          FAILED=$(jq  -r '.failed'   .test-cache/report.json)
          PASSED=$(jq  -r '.passed'   .test-cache/report.json)
          TS=$(jq      -r '.timestamp' .test-cache/report.json)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          {
            echo "**Tested against:** \`@anthropic-ai/claude-code@${VERSION}\`"
            echo ""
            echo "**Result:** ${PASSED} passed, ${FAILED} failed"
            echo ""
            echo "**Run:** [${{ github.run_id }}](${RUN_URL})"
            echo ""
            if [ "$FAILED" -gt 0 ]; then
              echo "## Broken patches"
              echo ""
              jq -r '.results[] | select(.ok == false) | "- **`\(.id)`** — \(.error)"' .test-cache/report.json
              echo ""
            fi
            echo "## All patches"
            echo ""
            jq -r '.results[] | if .ok then "- [x] `\(.id)`" else "- [ ] `\(.id)` — \(.error)" end' .test-cache/report.json
            echo ""
            echo "<sub>Auto-updated by \`test-patches.yml\` at ${TS}. This issue is managed automatically — it will be closed when all patches apply cleanly again.</sub>"
          } > issue-body.md

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED"   >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED"   >> "$GITHUB_OUTPUT"
        id: body

      - name: Open, update, or close regression issue
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="[auto] cx patches broken against latest claude-code"
          FAILED="${{ steps.body.outputs.failed }}"
          VERSION="${{ steps.body.outputs.version }}"

          # Ensure the label exists (no-op if already present).
          gh label create "patch-regression" \
            --color "d73a4a" \
            --description "A cx patch stopped applying cleanly against claude-code" \
            2>/dev/null || true

          ISSUE=$(gh issue list \
            --search "\"$TITLE\" in:title" \
            --state open \
            --json number \
            -q '.[0].number // ""')

          if [ "$FAILED" -gt 0 ]; then
            if [ -n "$ISSUE" ]; then
              echo "Updating existing issue #$ISSUE"
              gh issue edit "$ISSUE" --body-file issue-body.md
              gh issue comment "$ISSUE" --body "🔁 Still broken: $FAILED patch(es) failing against \`claude-code@${VERSION}\`. See issue body for current status."
            else
              echo "Opening new regression issue"
              URL=$(gh issue create \
                --title "$TITLE" \
                --body-file issue-body.md \
                --label "patch-regression")
              ISSUE=$(basename "$URL")
            fi
          else
            if [ -n "$ISSUE" ]; then
              echo "All patches green — closing issue #$ISSUE"
              gh issue close "$ISSUE" --comment "✅ All patches now apply cleanly against \`claude-code@${VERSION}\`. Auto-closing."
            else
              echo "All patches green — no existing issue, nothing to do."
            fi
          fi

          # Stash the issue number so the triage-dispatch follow-up step can
          # post an "attach to tmux" comment on it. Empty on green runs.
          echo "number=${ISSUE}" >> "$GITHUB_OUTPUT"

      # ───── Auto-triage dispatch ────────────────────────────────────────
      # When patches break, ship the failing context to a VPS where Claude
      # Code (authed under the operator's own account) will debug, fix, and
      # open a PR. See docs/triage-pipeline.md for the full architecture and
      # Hetzner setup runbook.
      #
      # This step is a no-op if TRIAGE_SSH_HOST isn't configured, so the
      # workflow continues to work on forks / before the VPS is provisioned.
      - name: Dispatch triage to VPS
        id: dispatch
        if: steps.body.outputs.failed != '0'
        env:
          SSH_HOST:    ${{ secrets.TRIAGE_SSH_HOST }}
          SSH_USER:    ${{ secrets.TRIAGE_SSH_USER }}
          SSH_PORT:    ${{ secrets.TRIAGE_SSH_PORT }}
          SSH_KEY:     ${{ secrets.TRIAGE_SSH_KEY }}
          SSH_KNOWN:   ${{ secrets.TRIAGE_SSH_KNOWN_HOSTS }}
          RUN_ID:      ${{ github.run_id }}
          RUN_URL:     https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO:        ${{ github.repository }}
          SHA:         ${{ github.sha }}
          VERSION:     ${{ steps.body.outputs.version }}
          FAILED:      ${{ steps.body.outputs.failed }}
          ISSUE:       ${{ steps.issue.outputs.number }}
        run: |
          set -euo pipefail

          # Forks and pre-provisioning runs don't have the secret configured.
          # Skip cleanly so the workflow doesn't turn red on a missing VPS.
          if [ -z "${SSH_HOST}" ]; then
            echo "TRIAGE_SSH_HOST secret not set — skipping VPS dispatch."
            echo "(Configure the TRIAGE_SSH_* secrets to enable auto-triage.)"
            exit 0
          fi

          # Install the SSH key + known_hosts into tempfiles. These live only
          # for the life of the runner and are never persisted.
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY"   > ~/.ssh/triage_id
          printf '%s\n' "$SSH_KNOWN" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/triage_id ~/.ssh/known_hosts

          # Build the payload: report + a small envelope of GitHub context.
          # The authorized_keys command= lock on the VPS means any positional
          # args to ssh are ignored — dispatch.sh reads stdin and that's it.
          jq -n \
            --arg run_id   "$RUN_ID" \
            --arg run_url  "$RUN_URL" \
            --arg repo     "$REPO" \
            --arg sha      "$SHA" \
            --arg version  "$VERSION" \
            --arg failed   "$FAILED" \
            --arg issue    "$ISSUE" \
            --slurpfile report .test-cache/report.json \
            '{run_id:$run_id, run_url:$run_url, repo:$repo, sha:$sha,
              version:$version, failed:($failed|tonumber),
              issue:($issue|tonumber? // null), report:$report[0]}' \
            > payload.json

          # ssh prints a "SESSION=<name>" line to stdout from dispatch.sh on
          # success — tee it to stderr (so it shows in the Actions log) and
          # grep the line out for step-output capture.
          SSH_OUT=$(mktemp)
          ssh -i ~/.ssh/triage_id \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o StrictHostKeyChecking=yes \
              -p "${SSH_PORT:-22}" \
              "$SSH_USER@$SSH_HOST" \
              < payload.json \
              | tee "$SSH_OUT"

          SESSION=$(grep -oE '^SESSION=[A-Za-z0-9_-]+$' "$SSH_OUT" | cut -d= -f2 || true)
          if [ -z "$SESSION" ]; then
            echo "::warning::dispatch.sh did not print a SESSION= line — no attach hint will be posted."
          fi

          {
            echo "session=$SESSION"
            echo "ssh_host=$SSH_HOST"
            echo "ssh_user=$SSH_USER"
          } >> "$GITHUB_OUTPUT"

      - name: Comment attach hint on regression issue
        if: steps.dispatch.outputs.session != '' && steps.issue.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE:    ${{ steps.issue.outputs.number }}
          SESSION:  ${{ steps.dispatch.outputs.session }}
          HOST:     ${{ steps.dispatch.outputs.ssh_host }}
          USER:     ${{ steps.dispatch.outputs.ssh_user }}
        run: |
          gh issue comment "$ISSUE" --body "🤖 Triage session started: \`$SESSION\`

          Attach on the VPS:
          \`\`\`sh
          ssh $USER@$HOST -t tmux attach -t $SESSION
          \`\`\`

          Claude will follow up here with a PR when the fix lands, or a diagnostic comment if it gets stuck."

      # Echo the full JSON report into the log instead of uploading it
      # as an artifact. actions/upload-artifact@v4 still ships Node 20,
      # which trips a workflow-level deprecation annotation; a plain
      # `cat` has the same diagnostic value for a ~3KB report and
      # introduces no third-party action at all.
      - name: Print report
        run: |
          echo "── .test-cache/report.json ──"
          jq . .test-cache/report.json
          echo "── end ──"

      # Fail the workflow if the tester reported broken patches, so the
      # Actions tab shows a red run (the tracking issue is only visible
      # on the Issues tab).
      - name: Set job status
        run: |
          FAILED="${{ steps.body.outputs.failed }}"
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED patch(es) failed against claude-code@${{ steps.body.outputs.version }}"
            exit 1
          fi
